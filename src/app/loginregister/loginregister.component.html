<div class="container">
    <div class="row">
        <div class="col-md-6">
            <h1>Registration</h1>
            <form [formGroup]="registerForm" (ngSubmit)="registernow()">
                <div class="form-group">
                    <label for="" class="form-label">username</label>
                    <input type="text" name="" id="" class="form-control" formControlName="username">
                </div>
                <div class="form-group">
                    <label for="" class="form-label">password</label>
                    <input type="password" name="" id="" class="form-control" formControlName="password">
                </div>
                <div class="form-group">
                    <label for="" class="form-label">email</label>
                    <input type="email" name="" id="" class="form-control" formControlName="email">
                </div>
                <div class="form-group">
                    <label for="" class="form-label">phone</label>
                    <input type="text" name="" id="" class="form-control" formControlName="phone">
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary">Register Now</button>
                </div>
            </form>

        </div>
        <div class="col-md-6">
            <h1>Login</h1>
            <form (ngSubmit)="loginnow()">
                <div class="form-group">
                    <label for="" class="form-label">username</label>
                    <input type="text" name="uname" id="" class="form-control" [(ngModel)]="username">
                </div>
                <div class="form-group">
                    <label for="" class="form-label">password</label>
                    <input type="password" name="pwd" id="" class="form-control" [(ngModel)]="password">
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary">Login</button>
                </div>
            </form>


        </div>
    </div>
</div>

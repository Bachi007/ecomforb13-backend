<div class="container">
    <div class="row">
        <div class="col-md-4" *ngFor="let p of products">
            <div class="card">
                <div class="card-header">
                    <img [src]="p.productImage" alt="" class="card-img-top" height="200">
                    <h4>{{p.productModel}}</h4>
                </div>
                <div class="card-body">
                    <p>{{p.productDescription}}</p>
                <h3>Price : <span class="badge bg-warning">{{p.productPrice | currency:'INR'}}</span></h3>
                </div>
                <div class="card-footer">
                    <button class="btn btn-primary">Add to 
                        Cart
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
